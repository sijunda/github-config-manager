name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.26']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        if: matrix.os != 'windows-latest'
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          go test -run '^$' ./...
          go test ./cmd/... ./internal/container/... ./internal/gitlab/... ./internal/provider/... ./internal/providerclient/... ./pkg/...

      - name: Validate Windows installer wrapper
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: scripts\install.bat --help

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --disable-all -E govet

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...

  release-smoke:
    name: Release Smoke Test
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, govulncheck]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Validate Unix installer
        run: |
          bash -n scripts/install.sh
          bash scripts/install.sh --help >/dev/null

      - name: Validate PowerShell installer
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("scripts/install.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List
            exit 1
          }
          ./scripts/install.ps1 -Help

      - name: Build snapshot release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean --skip=publish

      - name: Verify release artifacts
        run: bash scripts/verify-release-artifacts.sh dist

  release:
    name: Release
    needs: [release-smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
